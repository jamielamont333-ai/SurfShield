<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in to SurfShield</title>
<meta name="description" content="Sign in to your SurfShield account." />
<meta name="robots" content="noindex, nofollow" />

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root {
  --navy: #0d1b2a;
  --navy2: #1a2d42;
  --surface: #1e2f42;
  --teal: #00c2a8;
  --teal-dark: #00a08a;
  --teal-glow: rgba(0, 194, 168, 0.15);
  --coral: #ff6b4a;
  --white: #f8fafc;
  --text: #e8f0f7;
  --muted: #7a95b0;
  --muted2: #a8b8c8;
  --border: rgba(255, 255, 255, 0.08);
  --border2: rgba(255, 255, 255, 0.15);
  --error-bg: rgba(255, 107, 74, 0.1);
  --error-border: rgba(255, 107, 74, 0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
a { color: var(--teal); text-decoration: none; }
a:hover { text-decoration: underline; }

nav {
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  display: inline-flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 18px;
  color: var(--text);
}
.nav-logo:hover { text-decoration: none; }

main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.card {
  background: var(--navy2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  max-width: 420px;
  width: 100%;
}

.card h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  color: var(--white);
}

.card .subtitle {
  font-size: 14px;
  color: var(--muted2);
  margin-bottom: 28px;
  line-height: 1.5;
}

.card .subtitle strong {
  color: var(--text);
  font-weight: 600;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted2);
  margin-bottom: 8px;
  letter-spacing: 0.01em;
}

input[type="email"],
input[type="text"] {
  width: 100%;
  padding: 13px 14px;
  font-size: 15px;
  font-family: 'Syne', sans-serif;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

input[type="email"]:focus,
input[type="text"]:focus {
  border-color: var(--teal);
}

#codeInput {
  font-family: 'Inconsolata', monospace;
  font-size: 26px;
  font-weight: 500;
  text-align: center;
  letter-spacing: 12px;
  padding: 16px 14px;
}

#codeInput::placeholder {
  color: var(--muted);
  letter-spacing: 12px;
}

.btn {
  width: 100%;
  padding: 14px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  background: var(--teal);
  color: var(--navy);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 16px;
}

.btn:hover:not(:disabled) {
  background: var(--teal-dark);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px var(--teal-glow);
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.error-msg {
  background: var(--error-bg);
  border: 1px solid var(--error-border);
  color: #ffb4a3;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13px;
  margin-top: 14px;
  display: none;
}

.back-link {
  margin-top: 14px;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}

.back-link a {
  cursor: pointer;
  font-weight: 600;
}

.alt-action {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}

.alt-action a {
  color: var(--teal);
  font-weight: 600;
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <svg width="26" height="28" viewBox="0 0 32 34" fill="none">
      <path d="M16 2L3 7.5V17C3 23.8 8.8 30.1 16 32C23.2 30.1 29 23.8 29 17V7.5L16 2Z" fill="#0f2236" stroke="#00c2a8" stroke-width="1.5"/>
      <path d="M9 17C9 17 11.8 12.5 16 12.5C20.2 12.5 23 17 23 17C23 17 20.2 21.5 16 21.5C11.8 21.5 9 17 9 17Z" stroke="#00c2a8" stroke-width="1.3" fill="none"/>
      <circle cx="16" cy="17" r="2.8" fill="#00c2a8" opacity="0.9"/>
      <circle cx="16" cy="17" r="1.3" fill="#0d1b2a"/>
    </svg>
    SurfShield
  </a>
</nav>

<main>
  <div class="card">
    <h1 id="cardTitle">Sign in</h1>
    <p class="subtitle" id="cardSubtitle">Enter your email and we'll send you a 6-digit code. No password needed.</p>

    <!-- Step 1: Email form -->
    <form id="emailForm">
      <label for="emailInput">Email address</label>
      <input
        type="email"
        id="emailInput"
        name="email"
        placeholder="you@example.com"
        required
        autocomplete="email"
        autofocus
      />
      <button type="submit" class="btn" id="emailSubmitBtn">Send code</button>
    </form>

    <!-- Step 2: Code form (hidden until step 1 succeeds) -->
    <form id="codeForm" style="display: none;">
      <label for="codeInput">Enter the 6-digit code</label>
      <input
        type="text"
        id="codeInput"
        name="code"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="6"
        autocomplete="one-time-code"
        placeholder="------"
        required
      />
      <button type="submit" class="btn" id="codeSubmitBtn">Verify and sign in</button>
      <p class="back-link">Wrong email? <a id="backLink">Use a different email</a></p>
    </form>

    <div class="error-msg" id="errorMsg"></div>

    <div class="alt-action">
      Need help? <a href="/feedback">Contact support</a>
    </div>
  </div>
</main>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';

  // Supabase config (publishable key is safe to expose in browser code)
  const SUPABASE_URL = 'https://ngtqkyqckpbhwvejvtaa.supabase.co';
  const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_LaMUtr4HVrGyBP3Zqkg9HA_aMNKpuHO';

  const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  // Adjust copy if URL is /signup vs /signin
  if (window.location.pathname === '/signup' || window.location.pathname === '/signup.html') {
    document.getElementById('cardTitle').textContent = 'Create your account';
    document.getElementById('cardSubtitle').textContent = "Enter your email and we'll send you a 6-digit code. No password to remember.";
  }

  // Element references
  const cardTitle = document.getElementById('cardTitle');
  const cardSubtitle = document.getElementById('cardSubtitle');
  const emailForm = document.getElementById('emailForm');
  const emailInput = document.getElementById('emailInput');
  const emailSubmitBtn = document.getElementById('emailSubmitBtn');
  const codeForm = document.getElementById('codeForm');
  const codeInput = document.getElementById('codeInput');
  const codeSubmitBtn = document.getElementById('codeSubmitBtn');
  const backLink = document.getElementById('backLink');
  const errorMsg = document.getElementById('errorMsg');

  // Stash original copy so we can restore it if user goes back
  const originalTitle = cardTitle.textContent;
  const originalSubtitle = cardSubtitle.textContent;

  // Track which email the user is verifying
  let pendingEmail = '';

  function showError(message) {
    errorMsg.textContent = message;
    errorMsg.style.display = 'block';
  }
  function clearError() {
    errorMsg.style.display = 'none';
    errorMsg.textContent = '';
  }

  // Check if user is already signed in
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = '/account';
    }
  })();

  // --- Step 1: Send the 6-digit code ---
  emailForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const email = emailInput.value.trim().toLowerCase();
    if (!email) return;

    emailSubmitBtn.disabled = true;
    emailSubmitBtn.textContent = 'Sending...';

    try {
      const { error } = await supabase.auth.signInWithOtp({
        email: email,
        options: {
          shouldCreateUser: true
        }
      });

      if (error) throw error;

      // Success — switch UI to the code-entry step
      pendingEmail = email;
      emailForm.style.display = 'none';
      codeForm.style.display = 'block';
      cardTitle.textContent = 'Check your email';
      cardSubtitle.innerHTML = `We sent a 6-digit code to <strong>${email}</strong>. Enter it below to sign in.`;
      codeInput.focus();
    } catch (err) {
      console.error('signInWithOtp error:', err);
      showError(err.message || 'Something went wrong. Please try again.');
      emailSubmitBtn.disabled = false;
      emailSubmitBtn.textContent = 'Send code';
    }
  });

  // --- Step 2: Verify the code, get session ---
  codeForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const token = codeInput.value.trim();
    if (!token) return;

    codeSubmitBtn.disabled = true;
    codeSubmitBtn.textContent = 'Verifying...';

    try {
      const { error } = await supabase.auth.verifyOtp({
        email: pendingEmail,
        token: token,
        type: 'email'
      });

      if (error) throw error;

      // Session is set in localStorage — head to the dashboard
      window.location.href = '/account';
    } catch (err) {
      console.error('verifyOtp error:', err);
      showError(err.message || 'That code is invalid or expired. Try again.');
      codeSubmitBtn.disabled = false;
      codeSubmitBtn.textContent = 'Verify and sign in';
    }
  });

  // --- Back link: return to the email step ---
  backLink.addEventListener('click', () => {
    clearError();
    pendingEmail = '';
    codeInput.value = '';
    codeForm.style.display = 'none';
    emailForm.style.display = 'block';
    cardTitle.textContent = originalTitle;
    cardSubtitle.textContent = originalSubtitle;
    emailSubmitBtn.disabled = false;
    emailSubmitBtn.textContent = 'Send code';
    emailInput.focus();
  });
</script>

</body>
</html>
